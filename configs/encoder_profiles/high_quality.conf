# high_quality.conf — Perfil para tests en local
#
# Para pruebas en localhost sin restricciones de ancho de banda.
# Mejor calidad visual a costa de mayor bitrate.
#
# Parámetros a definir:
#   preset            = medium   (mejor compresión, más CPU)
#   tune              = zerolatency
#   profile           = main     (permite más herramientas de compresión)
#   width             = 176
#   height            = 144
#   fps               = 35       (nativo de DOOM, sin frame drop)
#   bitrate           = 1000     (kbps, generoso para local)
#   vbv_maxrate       = 1500     (kbps)
#   vbv_bufsize       = 1500     (kbps)
#   keyframe_interval = 70       (2 segundos a 35 FPS)
#   bframes           = 0        (mantener zerolatency)
#   ref_frames        = 3
#   scenecut          = 40       (habilitar detección de corte de escena)
#   rc_method         = abr

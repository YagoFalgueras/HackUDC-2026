# ultrafast_qcif.conf — Perfil de encoder para QCIF 176x144 ultrafast
#
# Perfil principal para operación en el satélite.
# Prioriza mínimo uso de CPU sobre eficiencia de compresión.
#
# Parámetros a definir:
#   preset            = ultrafast
#   tune              = zerolatency
#   profile           = baseline
#   width             = 176
#   height            = 144
#   fps               = 20
#   bitrate           = 256      (kbps)
#   vbv_maxrate       = 300      (kbps, ceil para picos)
#   vbv_bufsize       = 300      (kbps)
#   keyframe_interval = 40       (2 segundos a 20 FPS)
#   bframes           = 0        (sin B-frames para mínima latencia)
#   ref_frames        = 1        (mínimo para baseline)
#   scenecut          = 0        (desactivar detección de corte de escena)
#   rc_method         = abr      (average bitrate)

# low_bandwidth.conf — Perfil para ancho de banda crítico
#
# Para condiciones de enlace degradado. Reduce bitrate y FPS
# al mínimo viable para mantener jugabilidad.
#
# Parámetros a definir:
#   preset            = ultrafast
#   tune              = zerolatency
#   profile           = baseline
#   width             = 176
#   height            = 144
#   fps               = 10       (reducido para ahorrar bandwidth)
#   bitrate           = 64       (kbps, mínimo viable)
#   vbv_maxrate       = 80       (kbps)
#   vbv_bufsize       = 80       (kbps)
#   keyframe_interval = 20       (2 segundos a 10 FPS)
#   bframes           = 0
#   ref_frames        = 1
#   scenecut          = 0
#   rc_method         = abr
#   qp_max            = 51       (permitir máxima cuantización si es necesario)

# ground.conf — Configuración del lado estación terrestre
#
# Parámetros a definir:
#
# [network]
# satellite_ip      — IP del satélite (destino del uplink)
# downlink_port     — Puerto UDP de escucha de vídeo (default: 9001)
# uplink_port       — Puerto UDP de salida de input (default: 9002)
# control_port      — Puerto UDP para mensajes de control (default: 9003)
#
# [decoder]
# thread_count      — Hilos del decoder FFmpeg (default: 1, mínima latencia)
#
# [display]
# scale_factor      — Factor de escalado de QCIF (default: 4 → 704x576)
# fullscreen        — Iniciar en fullscreen (default: false)
# window_title      — Título base de la ventana
#
# [jitter_buffer]
# size_ms           — Tamaño del jitter buffer en ms (default: 30)
# max_packets       — Máximo de paquetes en el buffer (default: 64)
#
# [input]
# send_rate_hz      — Frecuencia de envío de input (default: 35 Hz, sincronizado con tick)
# gamepad_enabled   — Habilitar soporte de gamepad (default: false)

# satellite.conf — Configuración del lado satélite
#
# Parámetros a definir:
#
# [doom]
# wad_path          — Ruta al archivo WAD de DOOM (doom1.wad, doom2.wad)
# tick_rate         — Frecuencia del game loop (default: 35 Hz)
#
# [encoder]
# preset            — Preset de x264 (default: ultrafast)
# tune              — Tune de x264 (default: zerolatency)
# profile           — Perfil H.264 (default: baseline)
# target_fps        — FPS objetivo del encoder (default: 20)
# target_bitrate    — Bitrate objetivo en kbps (default: 256)
# keyframe_interval — Intervalo de keyframes en frames (default: 40 = 2s a 20fps)
# encoder_profile   — Ruta al perfil de encoder (ej: configs/encoder_profiles/ultrafast_qcif.conf)
#
# [network]
# ground_ip         — IP de la estación terrestre (destino del downlink)
# downlink_port     — Puerto UDP de salida de vídeo (default: 9001)
# uplink_port       — Puerto UDP de escucha de input (default: 9002)
# control_port      — Puerto UDP para mensajes de control (default: 9003)
#
# [threads]
# game_core         — Núcleo CPU para el game thread (default: 0)
# encoder_core      — Núcleo CPU para el encoder thread (default: 1)
# network_core      — Núcleo CPU para el network thread (default: 2)
# game_priority     — Prioridad SCHED_FIFO del game thread (default: 80)
# encoder_priority  — Prioridad SCHED_FIFO del encoder thread (default: 70)
